<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/camp-logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Camp Lawton — Staff Portal</title>
    <!-- Meta tags for SEO -->
    <meta name="description" content="Camp Lawton staff handbook training, schedules, EAP alarm simulator, safety guides, packing list, campfire metronome songbook, and code of conduct portal." />
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600;700;800&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  </head>
  <body>
    <!-- Canvas for confetti celebrations -->
    <canvas id="confetti-canvas"></canvas>

    <!-- Canvas for dynamic background ambiance -->
    <canvas id="bg-ambiance-canvas" style="position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; pointer-events: none; z-index: -1;"></canvas>

    <div class="app-container" style="padding-bottom: 60px;">
      <!-- Sidebar Navigation -->
      <aside class="sidebar">
        <div class="logo-container">
          <img src="/camp-logo.png" alt="Camp Lawton" style="width: 52px; height: 52px; object-fit: contain; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.2));" />
          <span class="logo-text">Camp Lawton</span>
        </div>

        <ul class="nav-links">
          <li class="nav-item active" data-view="dashboard">
            <button id="nav-btn-dashboard" aria-label="Go to Dashboard">
              <span class="nav-icon">🔥</span> Welcome / Home
            </button>
          </li>
          <li class="nav-item" data-view="camplawton">
            <button id="nav-btn-camplawton" aria-label="Go to Camp Lawton">
              <span class="nav-icon">🌲</span> Camp Lawton
            </button>
          </li>
          <li class="nav-item" data-view="training">
            <button id="nav-btn-training" aria-label="Go to Training">
              <span class="nav-icon">🎓</span> Training
            </button>
          </li>
          <li class="nav-item" data-view="policies">
            <button id="nav-btn-policies" aria-label="Go to Policies & Procedures" style="font-weight: 700;">
              <span class="nav-icon">🛟</span> Policies & Procedures
            </button>
          </li>
          <li class="nav-item" data-view="songbook">
            <button id="nav-btn-songbook" aria-label="Go to Songbook">
              <span class="nav-icon">🎤</span> Songbook
            </button>
          </li>
          <li class="nav-item" data-view="onboarding" id="nav-item-onboarding" style="display: none;">
            <button id="nav-btn-onboarding" aria-label="Go to Onboarding">
              <span class="nav-icon">🎒</span> Onboarding
            </button>
          </li>
          <li class="nav-item" data-view="forum" id="nav-item-forum" style="display: none;">
            <button id="nav-btn-forum" aria-label="Go to Forum">
              <span class="nav-icon">💬</span> Staff Forum
            </button>
          </li>
          <li class="nav-item" data-view="directory" id="nav-item-directory" style="display: none;">
            <button id="nav-btn-directory" aria-label="Go to Directory">
              <span class="nav-icon">👥</span> Staff Directory
            </button>
          </li>
          <li class="nav-item" data-view="admin" id="nav-item-admin" style="display: none;">
            <button id="nav-btn-admin" aria-label="Go to Admin Panel">
              <span class="nav-icon">🛡️</span> Admin Portal
            </button>
          </li>
        </ul>

      </aside>

      <!-- Main Shell Area -->
      <main class="main-content">
        <!-- Weather & Forest Alerts Banner -->
        <div id="weather-banner-mount"></div>

        <header class="content-header">
          <div class="header-title-section">
            <h1 class="view-heading" id="view-title">Dashboard</h1>
            <p id="view-subtitle">Welcome to your digital onboarding portal.</p>
          </div>

          <!-- Global search bar -->
          <div class="global-search-container" style="position: relative; margin-left: auto; margin-right: 16px;">
            <div class="search-input-wrapper" style="width: 240px; display: flex; align-items: center; background: var(--glass-bg); border: 1px solid hsl(var(--border)); border-radius: var(--radius-sm); padding: 4px 10px; gap: 8px;">
              <svg class="search-icon-svg" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color: hsl(var(--muted-foreground));">
                <circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line>
              </svg>
              <input type="text" id="global-search-input" placeholder="Search handbook..." aria-label="Search handbook content" style="background: none; border: none; outline: none; font-size: 14px; width: 100%; color: inherit;" />
            </div>
            <div id="global-search-dropdown" class="search-results-dropdown hidden" style="position: absolute; top: 100%; right: 0; width: 320px; background: hsl(var(--card)); border: 1px solid hsl(var(--border)); border-radius: var(--radius-sm); box-shadow: var(--shadow-lg); z-index: 1000; max-height: 400px; overflow-y: auto; margin-top: 6px; display: none;"></div>
          </div>

          <!-- Theme toggle button -->
          <button class="theme-toggle-btn" id="theme-toggle" aria-label="Toggle Theme" title="Toggle Theme" style="margin-right: 16px;">
            <span class="moon-icon" style="font-size: 20px;">🌙</span>
            <span class="sun-icon" style="font-size: 20px;">☀️</span>
          </button>

          <!-- User Profile Badge -->
          <div class="user-profile-badge" id="user-badge" aria-label="Edit Profile">
            <div class="user-avatar-placeholder" id="user-avatar">?</div>
            <span class="user-name-text" id="user-name-display">Guest</span>
          </div>
        </header>

        <!-- Dynamic Content Mount Area -->
        <section id="view-mount-point" class="view-mount-point">
          <!-- Injected views go here -->
        </section>
      </main>
    </div>

    <!-- Persistent floating emergency button -->
    <button class="floating-emergency-btn" id="quick-emergency-btn" title="Emergency Procedures">
      🚨 EMERGENCY
    </button>

    <!-- Reusable Dialog modal for detail view cards -->
    <dialog id="app-dialog" closedby="any" aria-labelledby="dialog-title">
      <div class="dialog-content">
        <button class="dialog-close-btn" id="dialog-close" aria-label="Close dialog">✕</button>
        <div id="dialog-mount-point">
          <!-- Dynamic details content goes here -->
        </div>
      </div>
    </dialog>

    <!-- Dialog for editing user profile / login / signup -->
    <dialog id="profile-dialog" closedby="any">
      <div class="dialog-content" id="profile-dialog-content">
        <!-- Injected dynamically by main.js -->
      </div>
    </dialog>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
